name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      npm_otp:
        description: "6-digit npm OTP (required for npmjs.com until bypass-2FA token is set)"
        required: false

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  publish-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com
          scope: "@techlestial"

      - run: npm install -g npm@latest
      - run: npm install --no-audit --no-fund
      - run: npm run component:build

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npmjs:
    runs-on: ubuntu-latest
    needs: publish-github
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm install -g npm@latest
      - run: npm install --no-audit --no-fund
      - run: npm run component:build

      - name: Publish to npmjs.com
        run: |
          if [ -n "${{ github.event.inputs.npm_otp }}" ]; then
            npm publish --access public --otp "${{ github.event.inputs.npm_otp }}"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
